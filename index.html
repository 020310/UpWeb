<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <!-- Configurações da Página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>UpWeb</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================================
         Borda Animada
    =========================================================== -->

    <div id="border"></div>

    <!-- ==========================================================
         Container Principal
    =========================================================== -->

    <main id="container">

        <!-- ======================================================
             Logo
        ======================================================= -->

        <img
            id="logo"
            src="img/Logo.png"
            alt="UpWeb">

        <!-- ======================================================
             Barra de Pesquisa
        ======================================================= -->

        <form id="searchForm">

    <input
        id="search"
        type="search"
        placeholder="Pesquisar..."
        autocomplete="off"
        spellcheck="false">

</form>

        <!-- ======================================================
             Área onde o JavaScript trocará o conteúdo
        ======================================================= -->

        <section id="content">

        </section>

    </main>

    <!-- ==========================================================
         Scripts
    =========================================================== -->

    <!-- Script Principal -->
    <script src="script.js"></script>

    <!-- Sistema de Pesquisa -->
    <script src="js/pesquisa.js"></script>

    <!-- Futuros Scripts

    <script src="js/router.js"></script>

    <script src="js/pages/itens.js"></script>

    -->

</html>
